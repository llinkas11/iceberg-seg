# scheme_E_natural: no resampling. Training distribution kept as-is.

id: scheme_E_natural
stage: train_only

rules:
  drop_gt_zero: false
  resample:     false

invariants:
  val_unchanged:  true
  test_unchanged: true

notes: |
  Explicit no-op scheme. Exists as the A/B partner for any scheme that
  resamples. A manifest run through scheme_E emits bytes identical to its
  input, only with balancing_scheme stamped in the manifest header.
