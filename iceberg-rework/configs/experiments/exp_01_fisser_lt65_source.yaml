# exp_01: swap only the dataset source to Fisser's original lt65 chips.
#
# Everything downstream (preprocessing, split policy, balancing, augmentation,
# training, inference, evaluation) stays identical. Any delta vs baseline is
# attributable to where the lt65 chips came from.

id: exp_01
inherits: baseline_v1

change:
  data:
    manifest_id: fisser_lt65_original
    source:      fisser_lt65_original

notes: |
  Uses the fisser_lt65_original dataset recipe. Assumes a manifest of that
  name has been built with scripts/build_clean_dataset.py against the Fisser
  lt65 chips only (no nulls injected, no our-lt65 chips merged).
