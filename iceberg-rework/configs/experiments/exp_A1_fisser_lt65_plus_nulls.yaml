# A1: Fisser lt65 + GT-zero chips. Same source as A0, aug still off.
#
# The single controlled difference from A0 is the addition of null chips to
# training via scheme_B. Answers: does showing the model empty water stop it
# hallucinating icebergs on null test chips?

id: exp_A1_fisser_lt65_plus_nulls
inherits: baseline_v1

change:
  data:
    manifest_id:      v4_raw_lt65_plus_nulls
    balancing_scheme: scheme_B_fisser_plus_nulls
  augmentation:
    enabled: false

controlled_variable: data

progression:
  phase: A
  step: A1
  compared_to: exp_A0_fisser_lt65_original

notes: |
  Built on v4_raw_lt65 (Fisser's faithful preprocessing) + 29 lt65 GT0 chips
  from scripts/build_lt65_nulls.py, grafted at 1:1 by scheme_B. Aug stays off
  so A1 vs A0 isolates the null-chip effect under raw preprocessing.

  PREREQUISITE: the v4_raw_lt65_plus_nulls manifest is not yet on disk.
  Build it by invoking build_lt65_nulls.py on top of v4_raw_lt65 (a
  follow-up step that merges reference/lt65_nulls_selected.csv into the
  manifest's training split and recomputes chips_sha).
