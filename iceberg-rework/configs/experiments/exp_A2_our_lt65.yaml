# A2: Fisser lt65 chips with OUR preprocessing (40 m filter + IC mask).
# Single controlled difference from A0 is the preprocessing pipeline.
# Same chips, same scheme_A drop-GT0, aug still off.

id: exp_A2_our_lt65
inherits: baseline_v1

change:
  data:
    manifest_id:      v4_clean_lt65
    balancing_scheme: scheme_A_fisser_original
  augmentation:
    enabled: false

controlled_variable: data

progression:
  phase: A
  step: A2
  compared_to: exp_A0_fisser_lt65_original

notes: |
  Uses v4_clean_lt65: same 330 Fisser lt65 chips as A0's source, but with our
  preprocessing applied (40 m root-length filter on components, training-time
  IC mask on chips with IC >= 15%, shadow merge). scheme_A drops any GT0 so
  training is positive-only, matching A0's structure.

  A0 -> A2 isolates the preprocessing-pipeline variable: chip source is
  identical, only the cleaning differs. The 68 IC-blocked Fisser chips that
  v4_raw_lt65 included are absent here (chip-drop side of IC). 112 of the
  198 v4_clean_lt65 training chips are pixel-masked.

  (Per-chip count differs from v4_raw_lt65 by design: the IC chip-drop
  filter keeps 330 of 398 Fisser chips, then redraws the 65/15/25 split.)
