# exp_05: baseline_v1 with augmentation disabled during training.
#
# One knob: augmentation.enabled flips to false. Dataset and split stay the
# same so every other downstream comparison holds.

id: exp_05
inherits: baseline_v1

change:
  augmentation:
    enabled: false

notes: |
  Trained on the identical chip set as baseline_v1 but with hflip/vflip/rot90
  augmentation disabled. Purpose: quantify augmentation lift on the current
  training volume (551 chips).
