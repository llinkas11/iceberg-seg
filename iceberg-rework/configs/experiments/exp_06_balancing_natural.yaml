# exp_06: baseline_v1 with balancing_scheme set to natural (no resampling).
#
# Baseline currently specifies balancing_scheme: none, which is effectively
# the same as natural. This experiment exists to record that choice explicitly
# so future balancing-on experiments have a clean A/B partner.

id: exp_06
inherits: baseline_v1

change:
  data:
    balancing_scheme: scheme_E_natural

notes: |
  Controlled variable: balancing scheme. Useful once scheme_B/D/F/G/H are in
  play, as the paired control for each.
